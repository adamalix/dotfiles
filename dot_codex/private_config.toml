approval_policy = "on-request"
model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
plan_mode_reasoning_effort = "high"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
apps = true
multi_agent = true
prevent_idle_sleep = true
shell_snapshot = true
js_repl = true
guardian_approval = true

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "/Users/adam/.cache/",
  "/Users/adam/.cargo",
  "/Users/adam/.npm",
  "/Users/adam/.rustup",
  "/Users/adam/Library/Caches/Homebrew",
  "/Users/adam/Library/Caches/mise",
]

[mcp_servers.sosumi]
url = "https://sosumi.ai/mcp"

[projects."/Users/adam/dev/github/handheldprojects/classifier-utils"]
trust_level = "trusted"

[projects."/Users/adam/dev/github/handheldprojects/inbound-ios"]
trust_level = "trusted"

[projects."/Users/adam/dev/github/handheldprojects/inbound-ios-2"]
trust_level = "trusted"

[projects."/Users/adam/dev/github/handheldprojects/inbound-ios-3"]
trust_level = "trusted"

[projects."/Users/adam/dev/github/handheldprojects/inbound-ios-4"]
trust_level = "trusted"

[projects."/Users/adam/.codex"]
trust_level = "trusted"

[projects."/Users/adam/dev/github/openai/codex"]
trust_level = "trusted"

[tui]
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-remaining",
  "total-input-tokens",
  "total-output-tokens",
]
